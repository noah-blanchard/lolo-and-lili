<!--
  Lolo & Lili — Email OTP template for BRAND-NEW users.
  Paste into: Supabase → Auth → Email Templates → "Confirm signup".
  Used because signInWithOtp runs with shouldCreateUser: true, so a
  first-time email hits this template. Sends a 6-digit code via {{ .Token }}.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light only" />
    <title>Welcome to Lolo &amp; Lili</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Quicksand:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    style="margin:0;padding:0;background-color:#fff7f0;font-family:'Quicksand',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;color:#4a3f44;"
  >
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#fff7f0;">
      <tr>
        <td align="center" style="padding:32px 16px;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:440px;">
            <!-- Brand -->
            <tr>
              <td align="center" style="padding-bottom:20px;">
                <span style="font-family:'Fredoka',sans-serif;font-size:26px;font-weight:700;color:#ff8fa3;">
                  Lolo &amp; Lili 💕
                </span>
              </td>
            </tr>
            <!-- Card -->
            <tr>
              <td
                style="background-color:#ffffff;border-radius:24px;padding:36px 32px;box-shadow:0 8px 24px rgba(255,143,163,0.18);"
              >
                <p style="margin:0 0 6px;font-family:'Fredoka',sans-serif;font-size:22px;font-weight:600;color:#4a3f44;">
                  Welcome, lovebird 🪺
                </p>
                <p style="margin:0 0 24px;font-size:15px;line-height:1.6;color:#9b8e93;">
                  Here's your code to open your little home for two.
                </p>

                <!-- Code pill -->
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                  <tr>
                    <td
                      align="center"
                      style="background-color:#e9f9f2;border-radius:18px;padding:22px 12px;"
                    >
                      <span
                        style="font-family:'Fredoka','Courier New',monospace;font-size:38px;font-weight:700;letter-spacing:12px;color:#205247;padding-left:12px;"
                      >
                        {{ .Token }}
                      </span>
                    </td>
                  </tr>
                </table>

                <p style="margin:22px 0 0;font-size:13px;line-height:1.6;color:#9b8e93;text-align:center;">
                  This code is valid for 10&nbsp;minutes. Type it into the app to get started.
                </p>
              </td>
            </tr>
            <!-- Footer -->
            <tr>
              <td align="center" style="padding:22px 12px 0;">
                <p style="margin:0;font-size:12px;line-height:1.6;color:#c4b8bc;">
                  Didn't sign up? You can safely ignore this email 🌷
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
